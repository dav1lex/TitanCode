<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <!-- Background gradient -->
  <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#5E17EB" />
    <stop offset="100%" stop-color="#2A0481" />
  </linearGradient>
  <rect width="1200" height="600" fill="url(#bg-gradient)" />
  
  <!-- Abstract tech elements -->
  <circle cx="900" cy="400" r="350" fill="#7A39F7" opacity="0.1" />
  <circle cx="300" cy="100" r="250" fill="#431099" opacity="0.2" />
  
  <!-- Grid pattern for a tech feel -->
  <g opacity="0.15">
    <line x1="0" y1="120" x2="1200" y2="120" stroke="white" stroke-width="1" />
    <line x1="0" y1="240" x2="1200" y2="240" stroke="white" stroke-width="1" />
    <line x1="0" y1="360" x2="1200" y2="360" stroke="white" stroke-width="1" />
    <line x1="0" y1="480" x2="1200" y2="480" stroke="white" stroke-width="1" />
    
    <line x1="200" y1="0" x2="200" y2="600" stroke="white" stroke-width="1" />
    <line x1="400" y1="0" x2="400" y2="600" stroke="white" stroke-width="1" />
    <line x1="600" y1="0" x2="600" y2="600" stroke="white" stroke-width="1" />
    <line x1="800" y1="0" x2="800" y2="600" stroke="white" stroke-width="1" />
    <line x1="1000" y1="0" x2="1000" y2="600" stroke="white" stroke-width="1" />
  </g>
  
  <!-- Logo icon (simplified for Twitter) -->
  <rect x="100" y="200" width="180" height="180" rx="40" fill="white" />
  <text x="190" y="315" font-family="Arial, sans-serif" font-size="100" font-weight="bold" fill="#5E17EB" text-anchor="middle" dominant-baseline="middle">TC</text>
  
  <!-- Main content -->
  <text x="330" y="250" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="white">TitanCode</text>
  <text x="330" y="320" font-family="Arial, sans-serif" font-size="36" font-weight="normal" fill="white">Professional Web Development</text>
  
  <!-- Tagline with icons -->
  <g transform="translate(330, 380)">
    <text font-family="Arial, sans-serif" font-size="26" fill="white">Custom-built websites & applications</text>
  </g>
  
  <g transform="translate(330, 430)">
    <text font-family="Arial, sans-serif" font-size="26" fill="white">Fast, modern & secure solutions</text>
  </g>
  
  <g transform="translate(330, 480)">
    <text font-family="Arial, sans-serif" font-size="26" fill="white">Optimized for search engines</text>
  </g>
  
  <!-- Website URL -->
  <text x="600" y="560" font-family="Arial, sans-serif" font-size="24" fill="white" text-anchor="middle">titancode.pl</text>
</svg> 